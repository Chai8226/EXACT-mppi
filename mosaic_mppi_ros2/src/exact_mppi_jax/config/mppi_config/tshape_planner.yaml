MPPI:
  motion_model_name: 'diff'
  model_dt: 0.1
  time_steps: 80
  batch_size: 1000
  iteration_count: 1
  temperature: 0.3
  gamma: 0.015
  vx_max: 2.0
  vx_min: -2.0
  # vy_max: 0.5
  wz_max: 2.0
  ax_max: 1.0
  ax_min: -1.0
  # ay_max: 3.0
  # ay_min: -3.0
  az_max: 2.0
  vx_std: 0.5
  # vy_std: 0.2
  wz_std: 0.5
  retry_attempt_limit: 1
  open_loop: False
  seed: 0
  debug: True

  max_obs_num: 50
  
  TrajectoryValidator:
    collision_lookahead_time: 2.0
    collision_margin_distance: 0.1
  
  Critics:
    ConstraintCritic:
      enabled: True
      cost_power: 1
      cost_weight: 4.0
    GoalCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 1.4
    GoalAngleCritic:
      enabled: True
      cost_power: 1
      cost_weight: 3.0
      threshold_to_consider: 0.5
    ObstaclesCritic:
      enabled: True
      cost_power: 1
      repulsion_weight: 3.0
      critical_weight: 30.0
      collision_cost: 100000.0
      collision_margin_distance: 0.2
      near_goal_distance: 0.5
      repulsion_distance: 2.0
    PathAlignCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      max_path_occupancy_ratio: 0.07
      trajectory_point_step: 4
      threshold_to_consider: 0.5
      offset_from_furthest: 20
      use_path_orientation: False
    PathFollowCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      offset_from_furthest: 1000
      threshold_to_consider: 0.5
    PathAngleCritic:
      enabled: False
      cost_power: 1
      cost_weight: 2.2
      offset_from_furthest: 4
      threshold_to_consider: 0.5
      max_angle_to_furthest: 0.785398
      mode: 1 # 0: FORWARD_PREFERENCE, 1: NO_DIRECTIONAL_PREFERENCE, 2: CONSIDER_FEASIBLE_PATH_ORIENTATIONS
    PreferForwardCritic:
      enabled: False
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 0.5
    VelocityDeadbandCritic:
      enabled: True
      cost_power: 1
      cost_weight: 35.0
      deadband_velocities: [0.0, 0.0, 0.0]
    TwirlingCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      pose_tolerance: 0.1

