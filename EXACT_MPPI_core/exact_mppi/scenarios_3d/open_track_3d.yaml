name: open_track_3d
description: Deterministic open-track yaw-only 3D MPPI baseline.

simulation:
  model_dt: 0.15
  max_steps: 70
  goal_tolerance: 0.28
  clearance_margin: 0.04

sensor:
  type: mid360_like
  min_range_m: 0.1
  max_range_m: 10.0
  horizontal_fov_deg: 360.0
  vertical_min_deg: -7.0
  vertical_max_deg: 52.0
  horizontal_samples: 36
  vertical_samples: 8
  noise_std_m: 0.0
  dropout_probability: 0.0

robot_volume:
  boxes:
    - center: [0.0, 0.0, 0.0]
      size: [0.35, 0.35, 0.35]

reference_path:
  point_count: 96
  waypoints:
    - [0.0, 0.0, 0.0, 0.0]
    - [0.8, 0.0, 0.0, 0.0]
    - [1.6, 0.0, 0.55, 0.0]
    - [2.4, 0.0, 0.55, 0.0]
    - [3.2, 0.0, 0.0, 0.0]

obstacles:
  geometry: []

controller:
  time_steps: 12
  max_obs_num: 48
  batch_size: 64
  iteration_count: 2
  seed: 23
  vx_max: 1.15
  vx_min: -0.2
  vy_max: 0.45
  vz_max: 1.0
  wz_max: 1.0
  vx_std: 0.25
  vy_std: 0.18
  vz_std: 0.24
  wz_std: 0.12
  temperature: 0.25
  goal_weight: 6.0
  path_weight: 7.0
  obstacles_repulsion_weight: 0.8
  obstacles_critical_weight: 35.0
  obstacles_repulsion_distance: 0.55
  PreferForwardCritic:
    enabled: true
    cost_weight: 0.5
  VelocityDeadbandCritic:
    enabled: false
  TwirlingCritic:
    enabled: true
    cost_weight: 0.1
