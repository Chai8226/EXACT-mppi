world:
  height: 42.0
  width: 42.0
  step_time: 0.1
  sample_time: 0.1
  offset: [5, 5]
  collision_mode: 'unobstructed'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape: 
      name: 'mosaic'
      vertices: [
        [[0.900, 0.300], [-0.900, 0.300], [-0.900, -0.300], [0.900, -0.300]],
        [[-0.600, 1.200], [-0.900, 1.200], [-0.900, -1.200], [-0.600, -1.200]]
      ]
      wheelbase: 1.6
    # Initial pose from src/ddr_minimal_sim/config/scenario_maze.yaml
    state: [10.0, 15.0, 1.58]
    # Goal: Top-right corner to force navigation through maze
    goal: [38.0, 38.0, 0.0]
    vel_max: [2.0, 0.55]
    vel_min: [-2.0, -0.55]
    acce: [1.0, 1.0]
    # behavior: {name: 'dash'}
    arrive_mode: 'state'
    goal_threshold: 0.2
    angle_tolerance: 0.1
    description: 'None'
    plot:
      show_trail: True
      trail_fill: False
      trail_alpha: 0.5
      trail_color: 'b'
      show_trajectory: False
      show_goal: True

    sensors: 
      - type: 'lidar2d'
        range_min: 0
        range_max: 50
        angle_range: 6.283
        number: 100
        noise: False
        offset: [0, 0, 0]
        alpha: 0.3

# Obstacles from src/ddr_minimal_sim/config/maps/maze_simple.yaml
obstacle:
  # ===== Circular Obstacles =====
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'circle', radius: 1.47}
    state: [26.0, 26.0, 0]
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'circle', radius: 1.05}
    state: [13.4, 40.7, 0]
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'circle', radius: 1.26}
    state: [40.7, 13.4, 0]
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'circle', radius: 1.05}
    state: [45.7, 43.7, 0]

  # ===== Boundary Walls =====
  # Bottom wall (center at 26, 5.1)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-21.0, -0.1], [21.0, -0.1], [21.0, 0.1], [-21.0, 0.1]]}
    state: [26.0, 5.1, 0.0]
  # Top wall (center at 26, 46.9)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-21.0, -0.1], [21.0, -0.1], [21.0, 0.1], [-21.0, 0.1]]}
    state: [26.0, 46.9, 0.0]
  # Left wall (center at 5.1, 26)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-0.1, -21.0], [0.1, -21.0], [0.1, 21.0], [-0.1, 21.0]]}
    state: [5.1, 26.0, 0.0]
  # Right wall (center at 46.9, 26)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-0.1, -21.0], [0.1, -21.0], [0.1, 21.0], [-0.1, 21.0]]}
    state: [46.9, 26.0, 0.0]

  # ===== Vertical Maze Walls =====
  # Wall 1: 3.36 x 16.8, center at (19.7, 16.8)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-1.68, -8.4], [1.68, -8.4], [1.68, 8.4], [-1.68, 8.4]]}
    state: [19.7, 16.8, 0.0]
  # Wall 2: 0.84 x 10.8, center at (34.4, 25.2)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-0.42, -5.4], [0.42, -5.4], [0.42, 5.4], [-0.42, 5.4]]}
    state: [34.4, 25.2, 0.0]

  # ===== Horizontal Maze Walls =====
  # Wall 1: 12.6 x 0.84, center at (15.5, 34.4)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-6.3, -0.42], [6.3, -0.42], [6.3, 0.42], [-6.3, 0.42]]}
    state: [15.5, 34.4, 0.0]
  # Wall 2: 12.6 x 0.84, center at (36.5, 17.6)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-6.3, -0.42], [6.3, -0.42], [6.3, 0.42], [-6.3, 0.42]]}
    state: [36.5, 17.6, 0.0]

  # ===== Small Walls =====
  # Wall 1: 0.84 x 10.5, center at (11.3, 26)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-0.42, -5.25], [0.42, -5.25], [0.42, 5.25], [-0.42, 5.25]]}
    state: [11.3, 26.0, 0.0]
  # Wall 2: 0.84 x 10.5, center at (40.7, 26)
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[-0.42, -5.25], [0.42, -5.25], [0.42, 5.25], [-0.42, 5.25]]}
    state: [40.7, 26.0, 0.0]

  # ===== Trap Block =====
  - number: 1
    distribution: {name: 'manual'}
    shape: {name: 'polygon', vertices: [[0.750, 1.750], [-0.250, 1.750], [-0.250, 0.750], [0.750, 0.750]]}
    state: [13.5, 13.5, 0.0]