# Reference path tracking
reference_path:
  enabled: True              # Enable reference path tracking cost
  path_type: 'line'
  grid_resolution: 0.5
  grid_inflation: 0.5
  weight: 0.01               # Weight for reference trajectory tracking cost

global_ref_path:
  publish_frequency: 10.0
  local_horizon: 500
  local_stride: 1
  local_reacquire_distance: 5.0
  path_resolution: 0.1
  map_config_file: map_tshape.yaml
  start: [5.0, 37.0, -1.5708]

ros2:
  control_frequency: 50.0
  scan_range_min: 0.0
  scan_range_max: 10.0
  enable_optimal_path_markers: true
