world:
  height: 32.0
  width: 32.0
  step_time: 0.1
  sample_time: 0.1
  offset: [10, 10]
  collision_mode: 'unobstructed'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'omni'}
    shape: 
      name: 'mosaic'
      vertices_list: [
        # T shape
        # [[0.300, 0.900], [-0.300, 0.900], [-0.300, -0.900], [0.300, -0.900]],
        # [[0.900, 0.900], [-0.900, 0.900], [-0.900, 0.600], [0.900, 0.600]]
        # F shape
        # [[-0.400, 1.000], [-0.800, 1.000], [-0.800, -1.000], [-0.400, -1.000]],
        # [[0.800, 1.000], [-0.800, 1.000], [-0.800, 0.600], [0.800, 0.600]],
        # [[0.400, 0.200], [-0.800, 0.200], [-0.800, -0.200], [0.400, -0.200]]
        # L shape
        [[1.000, -0.600], [-1.000, -0.600], [-1.000, -1.000], [1.000, -1.000]],
        [[-0.600, 1.000], [-1.000, 1.000], [-1.000, -1.000], [-0.600, -1.000]],
        # L shape convex
        # [[-1.000, 1.000],[-0.600, 1.000],[1.00, -0.60],[1.000, -1.00],[-1.000, -1.000]]
      ]
      wheelbase: 1.6
    # Start on the left side, before the slit
    state: [11.5, 14.0, 0.0]
    # Goal: Top-right corner to force navigation through maze
    goal: [35.0, 35.0, 1.57]
    vel_dim: 3
    velocity: [0, 0, 0]
    vel_max: [2.0, 2.0, 2.0]
    vel_min: [-2.0, -2.0, -2.0]
    acce: [2.0, 2.0, 2.0]
    # behavior: {name: 'dash'}
    arrive_mode: 'state'
    goal_threshold: 0.2
    angle_tolerance: 0.2
    description: 'None'
    plot:
      show_trail: True
      trail_fill: False
      trail_alpha: 0.5
      trail_color: 'b'
      show_trajectory: False
      show_goal: True

    sensors: 
      - type: 'lidar2d'
        range_min: 0
        range_max: 50
        angle_range: 6.283
        number: 100
        noise: False
        offset: [0, 0, 0]
        alpha: 0.3

# Obstacles from src/ddr_minimal_sim/config/maps/maze_simple.yaml
