name: narrow_gap_t_volume_3d
description: Deterministic narrow-gap scenario using an authoritative T-shaped 3D box-union robot volume.

simulation:
  model_dt: 0.15
  max_steps: 80
  goal_tolerance: 0.28
  clearance_margin: 0.04
  reference_window_lookahead_distance: 1.2

sensor:
  type: mid360_like
  min_range_m: 0.1
  max_range_m: 10.0
  horizontal_fov_deg: 360.0
  vertical_min_deg: -7.0
  vertical_max_deg: 52.0
  horizontal_samples: 36
  vertical_samples: 8
  noise_std_m: 0.0
  dropout_probability: 0.0

robot_volume:
  type: box_union
  boxes:
    - center: [-0.08, 0.0, 0.0]
      size: [0.68, 0.22, 0.30]
    - center: [0.22, 0.0, 0.0]
      size: [0.22, 0.62, 0.30]

reference_path:
  point_count: 96
  waypoints:
    - [0.0, 0.0, 0.0, 0.0]
    - [0.8, 0.0, 0.0, 0.0]
    - [1.6, 0.0, 0.0, 0.0]
    - [2.4, 0.0, 0.0, 0.0]
    - [3.2, 0.0, 0.0, 0.0]

obstacles:
  geometry:
    - type: box
      center: [1.6, -0.49, 0.0]
      size: [1.6, 0.10, 0.60]
    - type: box
      center: [1.6, 0.49, 0.0]
      size: [1.6, 0.10, 0.60]
  points:
    - [0.9, -0.47, 0.0]
    - [1.1, -0.47, 0.0]
    - [1.3, -0.47, 0.0]
    - [1.5, -0.47, 0.0]
    - [1.7, -0.47, 0.0]
    - [1.9, -0.47, 0.0]
    - [2.1, -0.47, 0.0]
    - [2.3, -0.47, 0.0]
    - [0.9, 0.47, 0.0]
    - [1.1, 0.47, 0.0]
    - [1.3, 0.47, 0.0]
    - [1.5, 0.47, 0.0]
    - [1.7, 0.47, 0.0]
    - [1.9, 0.47, 0.0]
    - [2.1, 0.47, 0.0]
    - [2.3, 0.47, 0.0]

controller:
  time_steps: 12
  max_obs_num: 64
  batch_size: 64
  iteration_count: 2
  seed: 31
  vx_max: 1.15
  vx_min: -0.2
  vy_max: 0.45
  vz_max: 0.45
  wz_max: 1.0
  vx_std: 0.25
  vy_std: 0.14
  vz_std: 0.10
  wz_std: 0.10
  temperature: 0.25
  goal_weight: 6.5
  path_weight: 8.0
  obstacles_repulsion_weight: 0.7
  obstacles_critical_weight: 38.0
  obstacles_repulsion_distance: 0.50
  PreferForwardCritic:
    enabled: true
    cost_weight: 0.5
  VelocityDeadbandCritic:
    enabled: false
  TwirlingCritic:
    enabled: true
    cost_weight: 0.1
