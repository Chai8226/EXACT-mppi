name: cluttered_corridor_3d
description: Deterministic cluttered static corridor scenario for yaw-only 3D planning.

simulation:
  model_dt: 0.15
  max_steps: 90
  goal_tolerance: 0.30
  clearance_margin: 0.04
  observation_range: 1.8
  max_obstacle_points: 72

robot_volume:
  boxes:
    - center: [0.0, 0.0, 0.0]
      size: [0.35, 0.35, 0.35]

reference_path:
  point_count: 108
  waypoints:
    - [0.0, 0.0, 0.0, 0.0]
    - [0.7, 0.18, 0.0, 0.0]
    - [1.4, -0.16, 0.12, 0.0]
    - [2.1, 0.18, 0.12, 0.0]
    - [2.8, -0.14, 0.0, 0.0]
    - [3.5, 0.0, 0.0, 0.0]

obstacles:
  points:
    - [0.55, -0.58, 0.0]
    - [0.85, 0.58, 0.0]
    - [1.10, -0.52, 0.12]
    - [1.35, 0.52, 0.12]
    - [1.65, -0.58, 0.12]
    - [1.95, 0.58, 0.12]
    - [2.20, -0.52, 0.12]
    - [2.50, 0.52, 0.0]
    - [2.80, -0.58, 0.0]
    - [3.10, 0.58, 0.0]
    - [0.95, -0.78, 0.0]
    - [1.45, 0.78, 0.12]
    - [1.95, -0.78, 0.12]
    - [2.45, 0.78, 0.0]
    - [0.75, 0.00, 0.48]
    - [1.55, 0.00, 0.54]
    - [2.35, 0.00, 0.50]
    - [3.05, 0.00, 0.44]

controller:
  time_steps: 12
  batch_size: 64
  iteration_count: 2
  seed: 47
  vx_max: 1.15
  vx_min: -0.2
  vy_max: 0.55
  vz_max: 0.65
  wz_max: 1.0
  vx_std: 0.25
  vy_std: 0.18
  vz_std: 0.16
  wz_std: 0.12
  temperature: 0.25
  goal_weight: 6.3
  path_weight: 8.0
  obstacles_repulsion_weight: 0.8
  obstacles_critical_weight: 38.0
  obstacles_repulsion_distance: 0.55
  PreferForwardCritic:
    enabled: true
    cost_weight: 0.5
  VelocityDeadbandCritic:
    enabled: false
  TwirlingCritic:
    enabled: true
    cost_weight: 0.1
