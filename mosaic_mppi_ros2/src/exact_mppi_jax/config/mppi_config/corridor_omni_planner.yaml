MPPI:
  motion_model: 'omni'
  model_dt: 0.05
  time_steps: 100
  batch_size: 1000
  iteration_count: 1
  temperature: 0.2
  gamma: 0.015
  vx_max: 3.0
  vx_min: -3.0
  vy_max: 3.0
  vx_min: -3.0
  wz_max: 3.0
  wz_min: -3.0
  ax_max: 3.0
  ax_min: -3.0
  ay_max: 3.0
  ay_min: -3.0
  az_max: 3.0
  vx_std: 1.0
  vy_std: 1.0
  wz_std: 1.0
  retry_attempt_limit: 1
  open_loop: False
  seed: 0
  debug: True

  max_obs_num: 100

  TrajectoryValidator:
    collision_lookahead_time: 2.0
    collision_margin_distance: 0.1

  Critics:
    ConstraintCritic:
      enabled: True
      cost_power: 1
      cost_weight: 4.0
    GoalCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 1.4
    GoalAngleCritic:
      enabled: True
      cost_power: 1
      cost_weight: 3.0
      threshold_to_consider: 0.5
    ObstaclesCritic:
      enabled: True
      cost_power: 1
      repulsion_weight: 3.0
      critical_weight: 30.0
      collision_cost: 100000.0
      collision_margin_distance: 0.2
      near_goal_distance: 0.5
      repulsion_distance: 5.0
    PathAlignCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      max_path_occupancy_ratio: 0.07
      trajectory_point_step: 4
      threshold_to_consider: 0.5
      offset_from_furthest: 20
      use_path_orientation: False
    PathFollowCritic:
      enabled: True
      cost_power: 1
      cost_weight: 8.0
      offset_from_furthest: 6
      threshold_to_consider: 0.5
    PathAngleCritic:
      enabled: True
      cost_power: 1
      cost_weight: 2.2
      offset_from_furthest: 4
      threshold_to_consider: 0.5
      max_angle_to_furthest: 0.785398
      mode: 1 # 0: FORWARD_PREFERENCE, 1: NO_DIRECTIONAL_PREFERENCE, 2: CONSIDER_FEASIBLE_PATH_ORIENTATIONS
    PreferForwardCritic:
      enabled: False
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 0.5
    VelocityDeadbandCritic:
      enabled: True
      cost_power: 1
      cost_weight: 35.0
      deadband_velocities: [0.0, 0.0, 0.0]
    TwirlingCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      pose_tolerance: 0.1

  vertices: [
    # T shape vertical
      [[0.900, 0.300], [-0.900, 0.300], [-0.900, -0.300], [0.900, -0.300]],
      [[-0.600, 1.200], [-0.900, 1.200], [-0.900, -1.200], [-0.600, -1.200]]
    ]
  wheelbase: 1.52
  min_turning_r: 2.6

# Reference path tracking
reference_path:
  enabled: True              # Enable reference path tracking cost
  path_type: 'line'
  grid_resolution: 0.5
  grid_inflation: 0.5
  weight: 0.01               # Weight for reference trajectory tracking cost
  # A* grid map parameters (only used when path_type='astar')
  grid_resolution: 0.5       # Grid resolution in meters per cell
  grid_inflation: 0.5        # Obstacle inflation radius in meters (safety margin)

global_ref_path:
  publish_frequency: 30.0
  local_horizon: 50
  local_stride: 2
  path_resolution: 0.2
  use_tf_pose: true


ros2:
  control_frequency: 50.0
  scan_range_min: 0.0
  scan_range_max: 10.0
  enable_optimal_path_markers: true
  optimal_path_markers_topic: /mppi_plan
  path_follow_marker_topic: /mppi_path_follow_marker
