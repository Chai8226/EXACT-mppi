world:
  height: 23
  width: 70
  step_time: 0.1
  sample_time: 0.1
  offset: [-3, 10]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape:
      name: 'mosaic'
      # T shape
      vertices: [
        [[0.900, 0.300], [-0.900, 0.300], [-0.900, -0.300], [0.900, -0.300]],
        [[-0.600, 1.200], [-0.900, 1.200], [-0.900, -1.200], [-0.600, -1.200]],
      ]
  
      # star shape 
      vertices: [
        [[-0.040, -1.240],
        [0.280, -0.280],
        [1.240, -0.280],
        [0.440, 0.200],
        [0.760, 1.160],
        [-0.040, 0.520],
        [-0.840, 1.160],
        [-0.520, 0.200],
        [-1.320, -0.280],
        [-0.360, -0.280],
        [-0.040, -1.240]]]

      # F shape  
      # vertices: [
      #     [[-0.400, 1.000], [-0.800, 1.000], [-0.800, -1.000], [-0.400, -1.000]],
      #     [[0.800, 1.000], [-0.800, 1.000], [-0.800, 0.600], [0.800, 0.600]],
      #     [[0.400, 0.200], [-0.800, 0.200], [-0.800, -0.200], [0.400, -0.200]]
      #   ]
      
      wheelbase: 1.52
    state: [0, 20, 0]
    goal: [60, 20, 0]
    vel_min: [-8, -1]
    vel_max: [8, 1]
    goal_threshold: 0.3
    description: 'Corridor dynamic obstacle test base config. Robot shape is overridden by the script.'
    plot:
      show_trail: True
      show_goal: True
      show_trajectory: False

    sensors:
      - type: 'lidar2d'
        range_min: 0
        range_max: 12
        angle_range: 6.28
        number: 120
        noise: False

obstacle: []
