world:
  height: 23
  width: 70
  step_time: 0.1
  sample_time: 0.1
  offset: [-3, 10]
  collision_mode: 'reactive'  # 'stop', 'unobstructed', 'reactive'
  control_mode: 'auto'  # 'keyboard', 'auto'


robot:
  - kinematics: {name: 'diff'} 
    shape: 
      name: 'mosaic'
      vertices_list: [
      # arrow
        # [[1.200, 0.750], [-1.800, 0.750], [-1.800, -0.750], [1.200, -0.750]],
        # [[1.350, 0.750], [-1.800, 0.750], [-1.800, -0.600], [1.350, -0.600]],
        # [[1.500, 0.450], [-1.800, 0.450], [-1.800, -0.450], [1.500, -0.450]],
        # [[1.650, 0.300], [-1.800, 0.300], [-1.800, -0.300], [1.650, -0.300]],
        # [[1.800, 0.300], [-1.800, 0.300], [-1.800, -0.150], [1.800, -0.150]],
        # [[1.050, 1.050], [0.450, 1.050], [0.450, -1.050], [1.050, -1.050]],
        # [[0.900, 1.200], [0.450, 1.200], [0.450, -1.200], [0.900, -1.200]]
        # T shape
        # [[0.350, 1.050], [-0.350, 1.050], [-0.350, -1.050], [0.350, -1.050]],
        # [[1.750, 1.050], [-1.750, 1.050], [-1.750, 0.700], [1.750, 0.700]],
        # T convex
      #  [[-1.750, 0.700],[-1.750, 1.050],[1.750, 1.050],[1.750, 0.700],[0.350, -1.050],[-0.350, -1.050],[-1.750, 0.700]]
        
        # T shape vertical
        [[0.900, 0.300], [-0.900, 0.300], [-0.900, -0.300], [0.900, -0.300]],
        [[-0.600, 1.200], [-0.900, 1.200], [-0.900, -1.200], [-0.600, -1.200]],
        # T vertical convex
        # [[-0.600, 1.200],[-0.900, 1.200],[-0.900, -1.200],[-0.600, -1.200],[0.900, -0.300],[0.900, 0.300],[-0.600, 1.200]]
      ]
      wheelbase: 1.52
    state: [0, 20, 0] 
    goal: [60, 20, 0] 
    vel_min: [-8, -1]
    vel_max: [8, 1]
    goal_threshold: 0.3
    description: 'None'
    plot:
      show_trail: True
      show_goal: True
      show_trajectory: False

    sensors: 
      - type: 'lidar2d'
        range_min: 0
        range_max: 10
        angle_range: 6.28
        number: 100
        noise: False
      

# DON: 1
obstacle:
  - number: 7
    distribution: {name: 'manual'}
    shape:
      - {name: 'rectangle', length: 70, width: 2} 
      - {name: 'rectangle', length: 70, width: 2}
      - {name: 'rectangle', length: 5, width: 2}
      - {name: 'rectangle', length: 5, width: 2}
      - {name: 'rectangle', length: 6, width: 2}
      - {name: 'rectangle', length: 6.5, width: 2}
      - {name: 'rectangle', length: 7.1, width: 1}

    state: [[30, 25, 0], [30, 15, 0], [10, 18.5, 1.57], [23, 22.5, 1.57], [36, 17, 2.1], [42, 22.5, 1.57], [47.8, 17.5, 5.3] ]

