MPPI:
  motion_model: 'omni'
  model_dt: 0.1
  time_steps: 50
  batch_size: 1000
  iteration_count: 1
  temperature: 0.3
  gamma: 0.015
  vx_max: 1.5
  vx_min: -1.5
  vy_max: 1.0
  wz_max: 2.0
  ax_max: 1.0
  ax_min: -1.0
  ay_max: 3.0
  ay_min: -3.0
  az_max: 2.0
  vx_std: 0.5
  vy_std: 0.2
  wz_std: 0.5
  retry_attempt_limit: 1
  open_loop: False
  seed: 0
  debug: True

  max_obs_num: 100
  
  TrajectoryValidator:
    collision_lookahead_time: 2.0
    collision_margin_distance: 0.00
  
  Critics:
    ConstraintCritic:
      enabled: True
      cost_power: 1
      cost_weight: 4.0
    GoalCritic:
      enabled: True
      cost_power: 1
      cost_weight: 2.0
      threshold_to_consider: 1.5
    GoalAngleCritic:
      enabled: True
      cost_power: 1
      cost_weight: 10.0
      threshold_to_consider: 0.5
    ObstaclesCritic:
      enabled: True
      cost_power: 1
      repulsion_weight: 3.0
      critical_weight: 30.0
      collision_cost: 100000.0
      collision_margin_distance: 0.1
      near_goal_distance: 0.5
      repulsion_distance: 5.0
    PathAlignCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      max_path_occupancy_ratio: 0.07
      trajectory_point_step: 4
      threshold_to_consider: 0.5
      offset_from_furthest: 20
      use_path_orientation: False
    PathFollowCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      offset_from_furthest: 6
      threshold_to_consider: 0.5
    PathAngleCritic:
      enabled: False
      cost_power: 1
      cost_weight: 2.2
      offset_from_furthest: 4
      threshold_to_consider: 0.5
      max_angle_to_furthest: 0.785398
      mode: 1 # 0: FORWARD_PREFERENCE, 1: NO_DIRECTIONAL_PREFERENCE, 2: CONSIDER_FEASIBLE_PATH_ORIENTATIONS
    PreferForwardCritic:
      enabled: False
      cost_power: 1
      cost_weight: 5.0
      threshold_to_consider: 0.5
    VelocityDeadbandCritic:
      enabled: True
      cost_power: 1
      cost_weight: 35.0
      deadband_velocities: [0.0, 0.0, 0.0]
    TwirlingCritic:
      enabled: True
      cost_power: 1
      cost_weight: 5.0
      pose_tolerance: 0.1

  # convex hull
  # footprint_type: 'polygon'  # 'polygon' for exact SDF, 'rectangle' for AABB
  # vertices: [
  #   # L shape convex
  #   [[-1.000, 1.000],[-0.600, 1.000],[1.00, -0.60],[1.000, -1.00],[-1.000, -1.000]]
  # ]

  # footprint_type: 'rectangle'  # 'polygon' for exact SDF, 'rectangle' for AABB
  vertices: [
    # L shape
    [[1.000, -0.600], [-1.000, -0.600], [-1.000, -1.000], [1.000, -1.000]],
    [[-0.600, 1.000], [-1.000, 1.000], [-1.000, -1.000], [-0.600, -1.000]]
  ]
  mosaic_unit_vertices: [[-1., 1.], [1., 1.], [1., -1.], [-1., -1.]]
  wheelbase: 1.6
  min_turning_r: 2.6

# Reference path tracking
reference_path:
  enabled: True              # Enable reference path tracking cost
  path_type: 'line'
  grid_resolution: 0.5
  grid_inflation: 0.5
  weight: 0.01               # Weight for reference trajectory tracking cost
  # A* grid map parameters (only used when path_type='astar')
  grid_resolution: 0.1       # Grid resolution in meters per cell
  grid_inflation: 0.1        # Obstacle inflation radius in meters (safety margin)
